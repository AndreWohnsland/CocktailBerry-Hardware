[project]
site_name = "CocktailBerry: Official Hardware"
site_description = "Official CocktailBerry Hardware Documentation: Open Source Software to easily build your own automated cocktail machine."
site_author = "Andre Wohnsland"
copyright = "&copy; Copyright 2026, Andre Wohnsland & contributors"

nav = [
  { "Home" = "index.md" },
  { "PCBAs" = [
    "pcbas/index.md",
    { "CocktailBerryBoard" = "pcbas/cocktailberry-board.md" },
  ]},
  { "Machines" = [
    "machines/index.md",
    { "CocktailBerry MK III" = [
      "machines/mk-iii/index.md",
      { "Needed Parts" = "machines/mk-iii/needed-parts.md" },
      { "Preparation" = "machines/mk-iii/preparation.md" },
      { "Assembly" = "machines/mk-iii/assembly.md" },
    ]},
  ]},
]

extra_css = ["stylesheets/extra.css"]

extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

[project.theme]
variant = "classic"
custom_dir = "docs/overrides"
logo = "img/berry.svg"
favicon = "img/favicon.ico"
features = [
  "navigation.sections",
  "navigation.footer",
  "content.code.copy",
  "content.code.annotate",
  "announce.dismiss",
  "content.tabs.link",
  "navigation.indexes",
  "content.tooltips",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Switch to light mode"

# Footer links to the main CocktailBerry project and its documentation.
[[project.extra.social]]
icon = "material/web"
link = "https://cocktailberry.org"
name = "CocktailBerry"

[[project.extra.social]]
icon = "material/book-open-variant"
link = "https://docs.cocktailberry.org"
name = "CocktailBerry Documentation"

# Since we customize superfences and tabbed, we must explicitly define all extensions
# https://zensical.org/docs/setup/extensions/#default-configuration-zensicaltoml
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = "#"
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
slugify = { function = "pymdownx.slugs.slugify", kwds = { case = "lower" } }
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
