name: Release Artifacts
run-name: 📦 Release artifacts — ${{ github.event.release.tag_name || 'manual run' }}

on:
  release:
    types: [published]
  workflow_dispatch: {} # allow manual test runs

permissions:
  contents: write # required for `gh release upload`

jobs:
  cad:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen # let headless freecadcmd satisfy Qt without xvfb
    # On manual runs the split job below fans each zip out into its own artifact;
    # it needs the list of zip stems the build produced.
    outputs:
      items: ${{ steps.list.outputs.items }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install FreeCAD 1.1
        # ubuntu-latest has no FreeCAD in apt on 24.04, and the stable PPA lags at
        # 0.21 -- too old to load our 1.1-authored files correctly (0.21 silently
        # drops newer features on open and exports wrong geometry). Use the
        # official AppImage so CI matches the version the CAD files are designed in.
        #
        # We unpack the AppImage's squashfs directly (its byte offset is the end of
        # the runtime ELF) rather than `--appimage-extract`, which must EXECUTE the
        # AppImage runtime -- that fails under `act` on Apple Silicon (amd64
        # emulation can't exec the runtime). The inner freecadcmd is an ordinary
        # binary, so this keeps the job runnable both on CI and locally via act.
        env:
          FREECAD_VERSION: "1.1.1"
        run: |
          set -euo pipefail
          curl -fSL -o /tmp/freecad.AppImage \
            "https://github.com/FreeCAD/FreeCAD/releases/download/${FREECAD_VERSION}/FreeCAD_${FREECAD_VERSION}-Linux-x86_64-py311.AppImage"
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends squashfs-tools
          offset=$(python3 -c 'import struct;d=open("/tmp/freecad.AppImage","rb").read(64);print(struct.unpack_from("<Q",d,0x28)[0]+struct.unpack_from("<H",d,0x3a)[0]*struct.unpack_from("<H",d,0x3c)[0])')
          unsquashfs -o "$offset" -d /tmp/freecad /tmp/freecad.AppImage >/dev/null
          # Symlink into /usr/local/bin (already on PATH) so build_artifacts.py's
          # shutil.which finds it. NOT $GITHUB_PATH: under act that clobbers PATH
          # and the next JS action loses `node`. $ORIGIN resolves through the
          # symlink, so the AppImage's bundled libs still load.
          sudo ln -sf "$(find /tmp/freecad -type f -name freecadcmd | head -1)" /usr/local/bin/freecadcmd
          freecadcmd --version

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Export CAD artifacts
        run: uv run python scripts/build_artifacts.py

      - name: Attach to release
        if: github.event_name == 'release'
        run: |
          for f in dist/*.zip; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}

      # Manual runs: stage the zips once for the split job (one bundled handoff),
      # and emit the per-zip stems so the split job can fan them out individually.
      - name: Stage zips for split (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: _cad-dist
          path: dist/*.zip
          if-no-files-found: error

      - name: List produced zips (manual runs)
        id: list
        if: github.event_name != 'release'
        run: |
          shopt -s nullglob
          items=$(for f in dist/*.zip; do basename "$f" .zip; done | jq -R . | jq -cs .)
          echo "items=$items" >> "$GITHUB_OUTPUT"

  cad-split:
    # One artifact per machine on manual runs, mirroring how a release uploads one
    # asset per zip. Build-once: this only re-uploads what the `cad` job staged.
    needs: cad
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        item: ${{ fromJSON(needs.cad.outputs.items) }}
    steps:
      - name: Download staged zips
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: _cad-dist
          path: dist
      - name: Upload ${{ matrix.item }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.item }}
          path: dist/${{ matrix.item }}.zip
          if-no-files-found: error

  board:
    runs-on: ubuntu-latest
    outputs:
      items: ${{ steps.list.outputs.items }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install KiCad + KiKit
        # Pinned matching pair: KiKit 1.8.0 added KiCad 10 support (and dropped
        # < v9), so it pairs with KiCad from the official 10.0 release PPA.
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends kicad
          # KiKit must live in the same Python as KiCad's pcbnew module, and on
          # PATH for the orchestrator -- install system-wide with sudo.
          sudo python3 -m pip install --break-system-packages "kikit==1.8.0"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Generate JLCPCB fabrication files
        run: uv run python scripts/build_fab.py

      - name: Attach to release
        if: github.event_name == 'release'
        run: |
          for f in dist/*.zip; do
            gh release upload "${{ github.event.release.tag_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Stage zips for split (manual runs)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: _board-dist
          path: dist/*.zip
          if-no-files-found: error

      - name: List produced zips (manual runs)
        id: list
        if: github.event_name != 'release'
        run: |
          shopt -s nullglob
          items=$(for f in dist/*.zip; do basename "$f" .zip; done | jq -R . | jq -cs .)
          echo "items=$items" >> "$GITHUB_OUTPUT"

  board-split:
    needs: board
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        item: ${{ fromJSON(needs.board.outputs.items) }}
    steps:
      - name: Download staged zips
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: _board-dist
          path: dist
      - name: Upload ${{ matrix.item }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.item }}
          path: dist/${{ matrix.item }}.zip
          if-no-files-found: error
